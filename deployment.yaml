apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    service: n8n
  name: n8n
  namespace: n8n
spec:
  # n8n requires a single replica because it uses a local SQLite/PVC for state.
  # If you switch to PostgreSQL you can still keep replicas: 1 unless you add
  # external session storage.
  replicas: 1
  selector:
    matchLabels:
      service: n8n
  # Recreate ensures the old pod is fully terminated before the new one starts,
  # which prevents two pods from writing to the same PVC simultaneously.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        service: n8n
    spec:
      initContainers:
        # Fix ownership of the data volume so the n8n process (UID 1000) can write to it.
        - name: volume-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown 1000:1000 /data"]
          volumeMounts:
            - name: n8n-claim0
              mountPath: /data
      containers:
        - name: n8n
          image: n8nio/n8n
          command:
            - /bin/sh
          args:
            - -c
            # A short sleep gives dependent services (e.g. PostgreSQL) a moment
            # to become ready before n8n tries to connect.
            - sleep 5; n8n start
          env:
            # --- Database ---
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_HOST
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_HOST
            - name: DB_POSTGRESDB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: DB_POSTGRESDB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_NON_ROOT_USER
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_NON_ROOT_PASSWORD
            # --- n8n networking ---
            - name: N8N_PROTOCOL
              value: http
            - name: N8N_PORT
              value: "5678"
          ports:
            - containerPort: 5678
          resources:
            requests:
              memory: "250Mi"
            limits:
              memory: "500Mi"
          volumeMounts:
            - mountPath: /home/node/.n8n
              name: n8n-claim0
      restartPolicy: Always
      volumes:
        - name: n8n-claim0
          persistentVolumeClaim:
            claimName: n8n-claim0
        - name: n8n-secret
          secret:
            secretName: n8n-secret
        - name: postgres-secret
          secret:
            secretName: postgres-secret
