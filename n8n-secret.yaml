---
# Template — DO NOT commit real values.
# Generate a strong random key with:
#   python3 -c "import secrets; print(secrets.token_hex(32))"
# Then replace the placeholder below, or manage this secret with an external
# secret manager (Sealed Secrets, SOPS, External Secrets, etc.).
apiVersion: v1
kind: Secret
metadata:
  name: n8n-secret
  namespace: n8n
type: Opaque
stringData:
  # n8n uses this key to encrypt stored credentials.
  # Must be at least 32 characters. Changing this key will invalidate
  # all previously saved credentials.
  N8N_ENCRYPTION_KEY: "<your-random-32-char-key>"